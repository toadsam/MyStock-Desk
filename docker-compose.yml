services:
  mysql:
    image: mysql:8.4
    container_name: stockflow-mysql
    environment:
      MYSQL_DATABASE: stockflow
      MYSQL_ROOT_PASSWORD: your_password
      TZ: Asia/Seoul
    ports:
      - "3306:3306"
    volumes:
      - stockflow-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-pyour_password"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    container_name: stockflow-backend
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: mysql
      STOCKFLOW_JWT_SECRET: change_this_secret_before_deploying_stockflow
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/stockflow?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: your_password
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8080
    container_name: stockflow-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  stockflow-mysql:
