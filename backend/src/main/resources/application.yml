server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:stockflow
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

stockflow:
  mock-member-id: 1
  jwt:
    secret: stockflow-local-development-secret-key-change-before-production
    expiration-seconds: 86400
  data-refresh:
    enabled: false
