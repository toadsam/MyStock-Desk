server:
  port: 8080

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:mysql,local}
  datasource:
    url: jdbc:h2:mem:stockflow
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Seoul

stockflow:
  mock-member-id: 1
  jwt:
    secret: stockflow-local-development-secret-key-change-before-production
    expiration-seconds: 86400
  data-refresh:
    enabled: false
  market-data:
    provider: yahoo
  dart:
    enabled: true
    api-key: ${DART_API_KEY:}
  news:
    seed-fallback:
      enabled: false
    google-rss:
      enabled: true
  sec:
    enabled: true
    default-symbols: NVDA,AAPL,MSFT,TSLA,AMD
    user-agent: ${SEC_USER_AGENT:StockFlow/1.0 contact@example.com}
  ai:
    provider: local
    openai:
      api-key: ${OPENAI_API_KEY:}
      model: ${OPENAI_MODEL:gpt-5-mini}
